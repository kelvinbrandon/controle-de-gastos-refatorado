<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Gastos</title>
    <link rel="stylesheet" href="style.css">
    
</head>

<body>
    <main>
        <h1>Controle de Gastos</h1>
        <form>
            <input  type="number" name="valor" placeholder="Digite o valor do gasto" />
            <select  name="categoria">
                <option>alimentacao</option>
                <option>transporte</option>
                <option>lazer</option>
                <option>outros</option>
            </select>
            <button type="submit" >Adicionar</button>
        </form>
        <P id="alimentacao">alimentacao : R$ 0,00</P>
        <P id="transporte">transporte : R$ 0,00</P>
        <P id="lazer">lazer : R$ 0,00</P>
        <P id="outros">outros : R$ 0,00</P>
        <P id="total">total : R$ 0,00</P>
    </main>

    <script type="module" src="/js/app.js"></script>
</body>


</html>
